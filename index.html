<!DOCTYPE html>
<html lang="pt" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Carrinhas</title>
<link rel="icon" type="image/png" href="35.png">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="Carrinhas.css">
</head>
<body>

<!-- ══════════════════════════════════════════
     ECRÃ DE SELEÇÃO DE PERFIL
══════════════════════════════════════════ -->
<div id="view-perfis" class="select-screen">

  <div class="select-topbar">
    <div class="select-logo-mark">
      <img src="35.png" alt="logo" />
    </div>
    <div class="select-topbar-actions">
      <button class="btn-theme" id="btn-theme" onclick="toggleTheme()" title="Tema"></button>
      <button class="btn-ghost" onclick="abrirCalculadora()">Calculadora</button>
    </div>
  </div>

  <div class="select-body">
    <p class="select-eyebrow">Os Pretos · RP</p>
    <h1 class="select-title">Gestão de Frotas</h1>
    <p class="select-sub">Escolhe o teu perfil para continuar</p>

    <div class="select-stats-row" id="perfis-hero-stats"></div>

    <div id="perfis-grid" class="perfis-grid"></div>

    <button class="select-new-btn" onclick="abrirModalPerfil()">
      <span class="select-new-plus">+</span> Novo perfil
    </button>
  </div>

  <div id="perfis-empty" style="display:none;">
    <div class="empty-state">
      <div class="empty-icon">🚐</div>
      <p>Nenhum perfil criado ainda.</p>
    </div>
  </div>

</div>

<!-- ══════════════════════════════════════════
     APP PRINCIPAL — SIDEBAR + MAIN
══════════════════════════════════════════ -->
<div id="view-carrinhas" class="app-shell" style="display:none;">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar" id="sidebar">

    <div class="sidebar-header">
      <button class="sidebar-back-btn" onclick="voltarPerfis()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="sidebar-profile-info">
        <span class="sidebar-profile-name" id="perfil-nome-titulo">—</span>
        <span class="sidebar-profile-sub" id="perfil-contador">—</span>
      </div>
      <button class="btn-theme sidebar-theme-btn" id="btn-theme-carrinhas" onclick="toggleTheme()" title="Tema"></button>
    </div>

    <!-- Stats -->
    <div class="sidebar-stats" id="stats-panel"></div>

    <!-- Brand nav -->
    <div class="sidebar-section">
      <div class="sidebar-section-label">Frotas</div>
      <nav class="sidebar-brands" id="sidebar-brands"></nav>
    </div>

    <!-- Filtros -->
    <div class="sidebar-section sidebar-section-filters">
      <div class="sidebar-section-label">
        Filtros
        <button class="filtro-limpar sidebar-limpar" id="filtro-limpar" onclick="limparFiltros()" style="display:none;">Limpar</button>
      </div>

      <input class="search-input sidebar-search" id="search-carrinhas" type="text" placeholder="Pesquisar..." oninput="filtrarCarrinhas(this.value)" />

      <select class="filtro-select sidebar-select" id="filtro-tipo" onchange="aplicarFiltros()">
        <option value="">Todos os tipos</option>
        <option value="Carrinha">🚐 Carrinha</option>
        <option value="Carro">🚗 Carro</option>
        <option value="Mota">🏍️ Mota</option>
        <option value="Barco">⛵ Barco</option>
      </select>

      <select class="filtro-select sidebar-select" id="filtro-marca" onchange="aplicarFiltros()">
        <option value="">Todas as marcas</option>
      </select>

      <div class="sidebar-chips-group">
        <div class="sidebar-chips-label">Carga</div>
        <div class="filtro-chips" id="filtro-carga-chips"></div>
      </div>
      <div class="sidebar-chips-group">
        <div class="sidebar-chips-label">Status</div>
        <div class="filtro-chips" id="filtro-status-chips"></div>
      </div>
    </div>

    <!-- Footer actions -->
    <div class="sidebar-footer">
      <button class="sidebar-footer-btn" onclick="abrirCalculadora()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/></svg>
        Calculadora
      </button>
      <button class="sidebar-footer-btn" onclick="exportarDados()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exportar
      </button>
    </div>

  </aside>

  <!-- ── MAIN ── -->
  <main class="main-content">

    <div class="main-topbar">
      <div class="main-topbar-left">
        <div id="sync-indicator" class="sync-indicator"></div>
      </div>
      <div class="main-topbar-right">
        <button class="btn-icon" id="btn-view-toggle" onclick="toggleViewMode()" title="Alternar vista"></button>
        <button class="btn-icon btn-compact-toggle" id="btn-compact" onclick="toggleCompactMode()" title="Modo compacto" style="display:none;"></button>
        <button class="btn-primary" onclick="abrirModalCarrinha()">+ Adicionar veículo</button>
      </div>
    </div>

    <div id="carrinhas-grid" class="carrinhas-grid"></div>
    <div id="carrinhas-empty" style="display:none;"></div>

  </main>

</div>

<!-- ══════════════════════════════════════════
     MODAIS
══════════════════════════════════════════ -->
<div id="modais-container">

<!-- Modal: Novo Perfil -->
<div class="modal-overlay" id="modal-perfil" onclick="fecharModalPerfil(event)">
  <div class="modal">
    <h3>Novo Perfil</h3>
    <div class="field"><label>Nome do perfil</label><input id="m-perfil-nome" type="text" placeholder="ex: João Silva" /></div>
    <div class="field"><label>Palavra-passe</label><input id="m-perfil-senha" type="password" placeholder="Palavra-passe do perfil" /></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="fecharModal('modal-perfil')">Cancelar</button>
      <button class="btn-primary" onclick="criarPerfil()">Criar</button>
    </div>
  </div>
</div>

<!-- Modal: Palavra-passe -->
<div class="modal-overlay" id="modal-senha" onclick="fecharModalSenha(event)">
  <div class="modal">
    <h3>🔒 Perfil protegido</h3>
    <p class="modal-desc" id="modal-senha-desc"></p>
    <div class="field" style="margin-top:16px;"><label>Palavra-passe</label><input id="m-senha-input" type="password" placeholder="Introduz a palavra-passe..." /></div>
    <p class="senha-erro" id="senha-erro" style="display:none;">Palavra-passe errada.</p>
    <div class="lembrar-label"><label><input type="checkbox" id="cb-lembrar" /> Lembrar nesta sessão</label></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="fecharModal('modal-senha')">Cancelar</button>
      <button class="btn-primary" onclick="confirmarSenha()">Entrar</button>
    </div>
  </div>
</div>

<!-- Modal: Nova Carrinha -->
<div class="modal-overlay" id="modal-carrinha" onclick="fecharModalCarrinha(event)">
  <div class="modal">
    <h3>Adicionar Veículo</h3>
    <div class="field"><label>Tipo de Veículo</label>
      <select id="m-tipo-veiculo">
        <option value="Carrinha">🚐 Carrinha</option><option value="Carro">🚗 Carro</option>
        <option value="Mota">🏍️ Mota</option><option value="Barco">⛵ Barco</option>
      </select></div>
    <div class="field"><label>Marca</label><input id="m-marca" type="text" placeholder="ex: Burrito, Bravado..." /></div>
    <div class="field"><label>Matrícula</label><input id="m-matricula" type="text" placeholder="ex: LL1 1LL" /></div>
    <div class="field"><label>Tipo de Carga</label>
      <select id="m-carga">
        <option value="">— Selecionar —</option><option>Vazio</option><option>Petróleo</option>
        <option>Ópio</option><option>Metafetamina</option><option>Cocaína</option>
        <option>Materiais</option><option>Armas</option><option>Dinheiro Sujo</option>
        <option>Erva</option><option>CAIXAS</option><option>Cenas Random</option>
      </select></div>
    <div class="field"><label>Status</label>
      <select id="m-status">
        <option value="">— Selecionar —</option><option>Vazio</option>
        <option>Processado</option><option>Não Processado</option>
      </select></div>
    <div class="field"><label>Estado</label><input id="m-estado" type="text" placeholder="ex: Cheio, Vazio..." /></div>
    <div class="field"><label>Notas</label><input id="m-notas" type="text" placeholder="Notas opcionais..." /></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="fecharModal('modal-carrinha')">Cancelar</button>
      <button class="btn-primary" onclick="adicionarCarrinha()">Adicionar</button>
    </div>
  </div>
</div>

<!-- Modal: Imagem -->
<div class="modal-overlay" id="modal-img" onclick="if(event.target===this)fecharModal('modal-img')">
  <div class="modal">
    <h3 id="modal-img-titulo">📷 Imagem</h3>
    <div class="img-paste-zone" id="img-paste-zone" tabindex="0">
      <img id="img-preview" src="" alt="preview" style="display:none;" />
      <div class="img-paste-hint" id="img-paste-hint"><span>Ctrl+V para colar print</span><small>ou usa as opções abaixo</small></div>
    </div>
    <div class="img-opcoes">
      <button class="btn-ghost" onclick="document.getElementById('img-file-input').click()">Procurar ficheiro</button>
      <input id="img-file-input" type="file" accept="image/*" style="display:none;" onchange="carregarFicheiro(this)" />
    </div>
    <div class="field" style="margin-top:12px;"><label>URL da imagem (opcional)</label><input id="m-img-url" type="url" placeholder="https://..." oninput="previewImgUrl()" /></div>
    <div class="modal-actions">
      <button class="btn-del-img" onclick="removerImagem()">Remover</button>
      <div style="flex:1"></div>
      <button class="btn-ghost" onclick="fecharModal('modal-img')">Cancelar</button>
      <button class="btn-primary" onclick="guardarImagem()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal: Histórico -->
<div class="modal-overlay" id="modal-historico" onclick="if(event.target===this)fecharModal('modal-historico')">
  <div class="modal modal-historico-card">
    <h3 id="modal-historico-titulo">Histórico</h3>
    <div id="historico-lista" class="historico-lista"></div>
    <div class="modal-actions"><button class="btn-primary" onclick="fecharModal('modal-historico')">Fechar</button></div>
  </div>
</div>

<!-- Modal: Confirmar -->
<div class="modal-overlay" id="modal-confirm" onclick="if(event.target===this)_confirmReject()">
  <div class="modal modal-confirm-card">
    <p class="confirm-msg" id="confirm-msg"></p>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="_confirmReject()">Cancelar</button>
      <button class="btn-confirm-danger" onclick="_confirmResolve()">Confirmar</button>
    </div>
  </div>
</div>

</div>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="Carrinhas.js"></script>

</body>
</html>
