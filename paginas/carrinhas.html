<!--         PÁGINA 2 — CARRINHAS              -->
<!-- ═══════════════════════════════════════════ -->

<div id="view-carrinhas" style="display:none;">
  <header>
    <div class="header-left">
      <button class="btn-back" onclick="voltarPerfis()">← Perfis</button>
      <div>
        <h1 id="perfil-nome-titulo">—</h1>
        <p class="subtitle" id="perfil-contador">0 / 0 Veículos em Uso</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-theme" id="btn-theme-carrinhas" onclick="toggleTheme()">🌙 Escuro</button>
      <button class="btn-ghost" onclick="abrirCalculadora()">Calculadora</button>
      <button class="btn-primary" onclick="abrirModalCarrinha()">+ Adicionar Veículo</button>
    </div>
  </header>

  <div id="carrinhas-grid" class="carrinhas-grid"></div>
  <div id="carrinhas-empty" class="empty-state" style="display:none;">
    <div class="empty-icon"><img src="35.png" style="width:64px;height:64px;object-fit:contain;" /></div>
    <p>Nenhum Veículo Registado.</p>
  </div>
</div>
